<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitFinder · GitHub Profile Finder</title>
  <meta name="description" content="GitFinder — search any GitHub profile and see their most recent repositories in real time.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div class="header-bar">
      <a href="https://geannyr.github.io/curriculo2/" class="back-link" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span data-i18n="back">Portfolio</span>
      </a>

      <div class="lang-toggle" role="group" data-i18n-attr="aria-label:a11y.changeLang" aria-label="Change language">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="pt">PT</button>
        <button type="button" data-lang="es">ES</button>
      </div>
    </div>

    <header class="hero">
      <div class="brand">
        <svg class="brand-icon" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="m21 21-4.3-4.3"/>
        </svg>
        <h1>Git<span>Finder</span></h1>
      </div>
      <p class="tagline" data-i18n="tagline">Search any GitHub profile and see their repositories in real time.</p>

      <form id="searchForm" class="search-form" autocomplete="off">
        <span class="search-prefix">@</span>
        <input
          type="text"
          id="userInput"
          data-i18n-attr="placeholder:placeholder"
          placeholder="github username"
          spellcheck="false"
          autocapitalize="off"
          autocorrect="off"
          required
        >
        <button type="submit" id="searchBtn">
          <span id="searchBtnText" data-i18n="search">Search</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="suggestions">
        <span data-i18n="tryLabel">Try:</span>
        <button type="button" class="chip" data-user="geannyr">geannyr</button>
        <button type="button" class="chip" data-user="torvalds">torvalds</button>
        <button type="button" class="chip" data-user="gaearon">gaearon</button>
        <button type="button" class="chip" data-user="sindresorhus">sindresorhus</button>
      </div>
    </header>

    <section id="resultArea" class="result" aria-live="polite"></section>

    <p id="emptyState" class="empty-state" data-i18n="emptyState">Type a username above to get started.</p>

    <footer class="footer">
      <p id="footerText">
        Made by <a href="https://geannyr.github.io/curriculo2/" target="_blank" rel="noopener">Geanny Rodrigues</a> · data via <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener">GitHub REST API</a>
      </p>
    </footer>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
